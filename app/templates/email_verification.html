<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Student System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="login-right" style="min-height: 100vh; width: 100%;">
        <div class="login-form-container verification-window">
            <h2 class="verification-title">Email Verification</h2>

            {% if success %}
            <div class="verification-status verification-success">
                <h3>✓ Email verified</h3>
                <p>You can now login.</p>
                <a href="{{ url_for('login') }}" class="btn btn-primary">Go to Login Now</a>
            </div>
            {% else %}
            <div class="verification-status verification-fail">
                <h3>✗ Verification Failed</h3>
                <p>{{ message }}</p>
                <a href="{{ url_for('register') }}" class="btn btn-primary">Back to Register</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>

</html>
