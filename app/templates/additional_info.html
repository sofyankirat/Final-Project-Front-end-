            <div class="additional-form-window">
                <h2>WE WANT TO KNOW MORE ABOUT YOU</h2>

                <form method="post" id="additionalInfoForm" novalidate>
                    <div class="form-group">
                        <label for="first_name">First name</label>
                        <div class="input-wrapper">
                            <input type="text" id="first_name" name="first_name" placeholder="Enter first name"
                                required>
                        </div>
                        <span class="input-error" id="firstNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="age" name="age" min="1" max="120" placeholder="Enter age" required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up" aria-label="Increase age">▲</button>
                                <button type="button" class="stepper-btn step-down" aria-label="Decrease age">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="ageError"></span>
                    </div>

                    <div class="form-group">
                        <label for="program">Program</label>
                        <div class="input-wrapper">
                            <select id="program" name="program" required>
                                <option value="" disabled selected>Select program</option>
                                <option value="Statistics and Computer Science">Statistics and Computer Science</option>
                                <option value="Mathematics">Mathematics</option>
                            </select>
                        </div>
                        <span class="input-error" id="programError"></span>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <div class="input-wrapper">
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <span class="input-error" id="genderError"></span>
                    </div>

                    <div class="form-group">
                        <label for="level">Level</label>
                        <div class="input-wrapper">
                            <select id="level" name="level" required>
                                <option value="" disabled selected>Select level</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                            </select>
                        </div>
                        <span class="input-error" id="levelError"></span>
                    </div>

                    <div class="form-group">
                        <label for="is_working">Is you working?</label>
                        <div class="input-wrapper">
                            <select id="is_working" name="is_working" required>
                                <option value="" disabled selected>Select option</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <span class="input-error" id="isWorkingError"></span>
                    </div>

                    <div class="form-group">
                        <label for="failed_subjects">Number of failed subjects</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="failed_subjects" name="failed_subjects" min="0" step="1"
                                placeholder="Enter number" required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up"
                                    aria-label="Increase failed subjects">▲</button>
                                <button type="button" class="stepper-btn step-down"
                                    aria-label="Decrease failed subjects">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="failedSubjectsError"></span>
                    </div>

                    <div class="form-group">
                        <label for="discipline_score">Discipline score from 1 to 10</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="discipline_score" name="discipline_score" min="1" max="10" step="1"
                                placeholder="1 to 10" value="5" required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up"
                                    aria-label="Increase discipline score">▲</button>
                                <button type="button" class="stepper-btn step-down"
                                    aria-label="Decrease discipline score">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="disciplineScoreError"></span>
                    </div>

                    <div class="form-group">
                        <label for="analytical_score">Analytical score from 1 to 10</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="analytical_score" name="analytical_score" min="1" max="10" step="1"
                                placeholder="1 to 10" value="5" required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up"
                                    aria-label="Increase analytical score">▲</button>
                                <button type="button" class="stepper-btn step-down"
                                    aria-label="Decrease analytical score">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="analyticalScoreError"></span>

                    <div class="form-group">

                            <div class="stepper-controls">

                                <button type="button" class="stepper-btn step-down"
                                    aria-label="Decrease practical score">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="practicalScoreError"></span>
                    </div>

                    <div class="form-group">
                        <label for="gpa">GPA from 0 to 5</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="gpa" name="gpa" min="0" max="5" step="0.01" placeholder="0 to 5"
                                required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up" aria-label="Increase GPA">▲</button>
                                <button type="button" class="stepper-btn step-down" aria-label="Decrease GPA">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="gpaError"></span>
                    </div>

                    <div class="form-group">
                        <label for="screen_hours">Average number of screen hours from 1 to 10</label>
                        <div class="input-wrapper number-input-wrapper">
                            <input type="number" id="screen_hours" name="screen_hours" min="1" max="10" step="0.1"
                                placeholder="1 to 10" required>
                            <div class="stepper-controls">
                                <button type="button" class="stepper-btn step-up"
                                    aria-label="Increase screen hours">▲</button>
                                <button type="button" class="stepper-btn step-down"
                                    aria-label="Decrease screen hours">▼</button>
                            </div>
                        </div>
                        <span class="input-error" id="screenHoursError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span>Continue</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        (function () {
            function enableSymbolHover() {
                document.body.classList.add('enable-symbol-hover');
                window.removeEventListener('mousemove', enableSymbolHover);
                window.removeEventListener('touchstart', enableSymbolHover);
            }

            function syncMobileStripLoopDistance() {
                const isMobile = window.matchMedia('(max-width: 1024px)').matches;
                const firstStrip = document.querySelector('.additional-illustration .symbols-container:first-child, .login-illustration .symbols-container:first-child');
                if (!firstStrip) {
                    return;
                }

                if (!isMobile) {
                    if (firstStrip.dataset.mobileTickerReady === '1') {
                        if (firstStrip.dataset.originalHtml) {
                            firstStrip.innerHTML = firstStrip.dataset.originalHtml;
                        }
                        firstStrip.dataset.mobileTickerReady = '0';
                    }
                    return;
                }

                if (firstStrip.dataset.mobileTickerReady !== '1') {
                    if (!firstStrip.dataset.originalHtml) {
                        firstStrip.dataset.originalHtml = firstStrip.innerHTML;
                    }
                    const originalSymbols = Array.from(firstStrip.querySelectorAll('.symbol'));
                    if (!originalSymbols.length) {
                        return;
                    }

                    const baseCount = Math.max(1, Math.floor(originalSymbols.length / 2));
                    const baseMarkup = originalSymbols
                        .slice(0, baseCount)
                        .map(symbol => symbol.outerHTML)
                        .join('');

                    firstStrip.innerHTML = baseMarkup + baseMarkup + baseMarkup;
                    firstStrip.dataset.mobileBaseCount = String(baseCount);
                    firstStrip.dataset.mobileTickerReady = '1';
                }

                const renderedSymbols = Array.from(firstStrip.querySelectorAll('.symbol'));
                if (!renderedSymbols.length) {
                    return;
                }

                const baseCount = Number(firstStrip.dataset.mobileBaseCount || '0');
                if (!baseCount) {
                    return;
                }

                requestAnimationFrame(function () {
                    let loopDistance = 0;
                    for (let index = 0; index < baseCount; index += 1) {
                        const currentSymbol = renderedSymbols[index];
                        if (!currentSymbol) {
                            break;
                        }
                        loopDistance += currentSymbol.getBoundingClientRect().width;
                    }

                    if (loopDistance > 0) {
                        firstStrip.style.setProperty('--mobile-loop-distance', `${loopDistance}px`);
                    }
                });
            }

            window.addEventListener('mousemove', enableSymbolHover, { once: true });
            window.addEventListener('touchstart', enableSymbolHover, { once: true });
            window.addEventListener('load', syncMobileStripLoopDistance);
            window.addEventListener('resize', syncMobileStripLoopDistance);

            const firstNameInput = document.getElementById('first_name');
            const programInput = document.getElementById('program');
            const genderInput = document.getElementById('gender');
            const levelInput = document.getElementById('level');
            const isWorkingInput = document.getElementById('is_working');
            const ageInput = document.getElementById('age');
            const failedSubjectsInput = document.getElementById('failed_subjects');
            const disciplineScoreInput = document.getElementById('discipline_score');
            const analyticalScoreInput = document.getElementById('analytical_score');
            const practicalScoreInput = document.getElementById('practical_score');
            const gpaInput = document.getElementById('gpa');
            const screenHoursInput = document.getElementById('screen_hours');

            const firstNameError = document.getElementById('firstNameError');
            const programError = document.getElementById('programError');
            const genderError = document.getElementById('genderError');
            const levelError = document.getElementById('levelError');
            const isWorkingError = document.getElementById('isWorkingError');
            const ageError = document.getElementById('ageError');
            const failedSubjectsError = document.getElementById('failedSubjectsError');
            const disciplineScoreError = document.getElementById('disciplineScoreError');
            const analyticalScoreError = document.getElementById('analyticalScoreError');
            const practicalScoreError = document.getElementById('practicalScoreError');
            const gpaError = document.getElementById('gpaError');
            const screenHoursError = document.getElementById('screenHoursError');
            const failedSubjectsMaxByLevel = {
                '1': 11,
                '2': 24,
                '3': 38,
                '4': 51
            };

            function updateFailedSubjectsConstraint() {
                const selectedLevel = levelInput.value;
                const maxFailedSubjects = failedSubjectsMaxByLevel[selectedLevel];

                if (maxFailedSubjects === undefined) {
                    failedSubjectsInput.removeAttribute('max');
                    failedSubjectsInput.placeholder = 'Enter number';
                    return;
                }

                failedSubjectsInput.max = String(maxFailedSubjects);
                failedSubjectsInput.placeholder = `0 to ${maxFailedSubjects}`;
            }

            function validateFirstName() {
                if (!firstNameInput.value.trim()) {
                    firstNameError.textContent = 'First name is required.';
                    return false;
                }

                firstNameError.textContent = '';
                return true;
            }

            function validateProgram() {
                if (!programInput.value) {
                    programError.textContent = 'Program is required.';
                    return false;
                }

                programError.textContent = '';
                return true;
            }

            function validateGender() {
                if (!genderInput.value) {
                    genderError.textContent = 'Gender is required.';
                    return false;
                }

                genderError.textContent = '';
                return true;
            }

            function validateLevel() {
                if (!levelInput.value) {
                    levelError.textContent = 'Level is required.';
                    return false;
                }

                levelError.textContent = '';
                return true;
            }

            function validateIsWorking() {
                if (!isWorkingInput.value) {
                    isWorkingError.textContent = 'Please select if you are working.';
                    return false;
                }

                isWorkingError.textContent = '';
                return true;
            }

            function validateAge() {
                if (!ageInput.value) {
                    ageError.textContent = 'Age is required.';
                    return false;
                }

                if (Number(ageInput.value) < 0) {
                    ageError.textContent = 'Age cannot be negative.';
                    return false;
                }

                ageError.textContent = '';
                return true;
            }

            function validateFailedSubjects() {
                if (!failedSubjectsInput.value) {
                    failedSubjectsError.textContent = 'Number of failed subjects is required.';
                    return false;
                }

                if (!levelInput.value) {
                    failedSubjectsError.textContent = 'Please select level first.';
                    return false;
                }

                const maxFailedSubjects = failedSubjectsMaxByLevel[levelInput.value];

                if (Number(failedSubjectsInput.value) < 0) {
                    failedSubjectsError.textContent = 'Number of failed subjects cannot be negative.';
                    return false;
                }

                if (Number(failedSubjectsInput.value) > maxFailedSubjects) {
                    failedSubjectsError.textContent = `For level ${levelInput.value}, number of failed subjects must be between 0 and ${maxFailedSubjects}.`;
                    return false;
                }

                failedSubjectsError.textContent = '';
                return true;
            }

            function validateDisciplineScore() {
                if (!disciplineScoreInput.value) {
                    disciplineScoreError.textContent = '';
                    return true;
                }

                const disciplineValue = Number(disciplineScoreInput.value);
                if (disciplineValue < 1) {
                    disciplineScoreError.textContent = 'Discipline score must be at least 1.';
                    return false;
                }

                if (disciplineValue > 10) {
                    disciplineScoreError.textContent = 'Discipline score cannot be higher than 10.';
                    return false;
                }

                disciplineScoreError.textContent = '';
                return true;
            }

            function validateAnalyticalScore() {
                if (!analyticalScoreInput.value) {
                    analyticalScoreError.textContent = '';
                    return true;
                }

                const analyticalValue = Number(analyticalScoreInput.value);
                if (analyticalValue < 1) {
                    analyticalScoreError.textContent = 'Analytical score must be at least 1.';
                    return false;
                }

                if (analyticalValue > 10) {
                    analyticalScoreError.textContent = 'Analytical score cannot be higher than 10.';
                    return false;
                }

                analyticalScoreError.textContent = '';
                return true;
            }

            function validatePracticalScore() {
                if (!practicalScoreInput.value) {
                    practicalScoreError.textContent = '';
                    return true;
                }

                const practicalValue = Number(practicalScoreInput.value);
                if (practicalValue < 1) {
                    practicalScoreError.textContent = 'Practical score must be at least 1.';
                    return false;
                }

                if (practicalValue > 10) {
                    practicalScoreError.textContent = 'Practical score cannot be higher than 10.';
                    return false;
                }

                practicalScoreError.textContent = '';
                return true;
            }

            function validateGpa() {
                if (!gpaInput.value) {
                    gpaError.textContent = 'GPA is required.';
                    return false;
                }

                const gpaValue = Number(gpaInput.value);
                if (gpaValue < 0) {
                    gpaError.textContent = 'GPA cannot be negative.';
                    return false;
                }

                if (gpaValue > 5) {
                    gpaError.textContent = 'GPA cannot be higher than 5.';
                    return false;
                }

                gpaError.textContent = '';
                return true;
            }

            function validateScreenHours() {
                if (!screenHoursInput.value) {
                    screenHoursError.textContent = 'Number of screen hours is required.';
                    return false;
                }

                const screenHoursValue = Number(screenHoursInput.value);
                if (screenHoursValue < 1) {
                    screenHoursError.textContent = 'Number of screen hours must be at least 1.';
                    return false;
                }

                if (screenHoursValue > 10) {
                    screenHoursError.textContent = 'Number of screen hours cannot be higher than 10.';
                    return false;
                }

                screenHoursError.textContent = '';
                return true;
            }

            firstNameInput.addEventListener('input', validateFirstName);
            programInput.addEventListener('change', validateProgram);
            genderInput.addEventListener('change', validateGender);
            levelInput.addEventListener('change', function () {
                validateLevel();
                updateFailedSubjectsConstraint();
                if (failedSubjectsInput.value) {
                    validateFailedSubjects();
                }
            });
            isWorkingInput.addEventListener('change', validateIsWorking);
            ageInput.addEventListener('input', validateAge);
            failedSubjectsInput.addEventListener('input', validateFailedSubjects);
            disciplineScoreInput.addEventListener('input', validateDisciplineScore);
            analyticalScoreInput.addEventListener('input', validateAnalyticalScore);
            practicalScoreInput.addEventListener('input', validatePracticalScore);
            gpaInput.addEventListener('input', validateGpa);
            screenHoursInput.addEventListener('input', validateScreenHours);

            document.addEventListener('click', function (event) {
                const stepButton = event.target.closest('.stepper-btn');
                if (!stepButton) return;

                const wrapper = stepButton.closest('.number-input-wrapper');
                if (!wrapper) return;

                const input = wrapper.querySelector('input[type="number"]');
                if (!input) return;

                if (stepButton.classList.contains('step-up')) {
                    input.stepUp();
                } else {
                    input.stepDown();
                }

                input.dispatchEvent(new Event('input', { bubbles: true }));
                input.dispatchEvent(new Event('change', { bubbles: true }));
            });

            const additionalInfoForm = document.getElementById('additionalInfoForm');
            updateFailedSubjectsConstraint();
            additionalInfoForm.addEventListener('submit', function (event) {
                const isValid = validateFirstName()
                    && validateProgram()
                    && validateGender()
                    && validateLevel()
                    && validateIsWorking()
                    && validateAge()
                    && validateFailedSubjects()
                    && validateDisciplineScore()
                    && validateAnalyticalScore()
                    && validatePracticalScore()
                    && validateGpa()
                    && validateScreenHours();
                if (!isValid) {
                    event.preventDefault();
                }
            });
        })();
    </script>
</body>

</html>
