                                                <span class="input-error" id="passwordError"></span>
                                        </div>

                                        <div class="form-group">
                                                <label for="confirm_password">Confirm Password</label>
                                                <div class="input-wrapper">
                                                        <input type="password" id="confirm_password"
                                                                name="confirm_password" placeholder="Confirm password"
                                                                required minlength="6">
                                                        <button type="button" class="password-toggle lamp-off"
                                                                data-target="confirm_password"
                                                                aria-label="Show password">
                                                                💡
                                                        </button>
                                                </div>
                                                <span class="input-error" id="confirmError"></span>
                                        </div>

                                        <div id="errorMessage" class="error-message" style="display: none;"></div>
                                        <div id="successMessage" class="success-message" style="display: none;"></div>

                                        <button type="submit" class="btn btn-primary btn-login">
                                                <span>Register</span>
                                                <span class="btn-icon">→</span>
                                        </button>
                                </form>

                                <div class="login-footer">
                                        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                                </div>
                        </div>
                </div>
        </div>

        <script>
                (function () {
                        function enableSymbolHover() {
                                document.body.classList.add('enable-symbol-hover');
                                window.removeEventListener('mousemove', enableSymbolHover);
                                window.removeEventListener('touchstart', enableSymbolHover);
                        }

                        function syncMobileStripLoopDistance() {
                                const isMobile = window.matchMedia('(max-width: 1024px)').matches;
                                const firstStrip = document.querySelector('.login-illustration .symbols-container:first-child');
                                if (!firstStrip) {
                                        return;
                                }

                                if (!isMobile) {
                                        if (firstStrip.dataset.mobileTickerReady === '1') {
                                                if (firstStrip.dataset.originalHtml) {
                                                        firstStrip.innerHTML = firstStrip.dataset.originalHtml;
                                                }
                                                firstStrip.dataset.mobileTickerReady = '0';
                                        }
                                        return;
                                }

                                if (firstStrip.dataset.mobileTickerReady !== '1') {
                                        if (!firstStrip.dataset.originalHtml) {
                                                firstStrip.dataset.originalHtml = firstStrip.innerHTML;
                                        }
                                        const originalSymbols = Array.from(firstStrip.querySelectorAll('.symbol'));
                                        if (!originalSymbols.length) {
                                                return;
                                        }

                                        const baseCount = Math.max(1, Math.floor(originalSymbols.length / 2));
                                        const baseMarkup = originalSymbols
                                                .slice(0, baseCount)
                                                .map(symbol => symbol.outerHTML)
                                                .join('');

                                        firstStrip.innerHTML = baseMarkup + baseMarkup + baseMarkup;
                                        firstStrip.dataset.mobileBaseCount = String(baseCount);
                                        firstStrip.dataset.mobileTickerReady = '1';
                                }

                                const renderedSymbols = Array.from(firstStrip.querySelectorAll('.symbol'));
                                if (!renderedSymbols.length) {
                                        return;
                                }

                                const baseCount = Number(firstStrip.dataset.mobileBaseCount || '0');
                                if (!baseCount) {
                                        return;
                                }

                                requestAnimationFrame(function () {
                                        let loopDistance = 0;
                                        for (let index = 0; index < baseCount; index += 1) {
                                                const currentSymbol = renderedSymbols[index];
                                                if (!currentSymbol) {
                                                        break;
                                                }
                                                loopDistance += currentSymbol.getBoundingClientRect().width;
                                        }

                                        if (loopDistance > 0) {
                                                firstStrip.style.setProperty('--mobile-loop-distance', `${loopDistance}px`);
                                        }
                                });
                        }

                        window.addEventListener('mousemove', enableSymbolHover, { once: true });
                        window.addEventListener('touchstart', enableSymbolHover, { once: true });
                        window.addEventListener('load', syncMobileStripLoopDistance);
                        window.addEventListener('resize', syncMobileStripLoopDistance);
                })();
        </script>

        <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>

</html>
